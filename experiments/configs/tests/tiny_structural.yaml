# Smoke test: structural filter (RC phenomenon). Exercises StructuralFilteredKNNWrapper
# in the `w` condition. Other conditions (w/o, w+r, wo+r) can be selected via CLI:
#   python ... retrieval.condition=w+r
model:
  name_or_path: sshleifer/tiny-gpt2
  model_type: gpt2

corpus:
  path: experiments/tests/fixtures/train/tiny_corpus.txt

retrieval:
  mode: structural
  granularity: sequence
  tau: 3
  k: 1
  lmbda: 0.25
  tau_softmax: 1.0
  phenomenon: RC
  condition: w
  rng_seed: 0

datastore:
  dir: results/smoke/structural
  keytype: last_ffn_input
  batch_size: 4
  tiny_mode: true

eval:
  freq_path: experiments/tests/fixtures/freq/tiny_word_freq.json
  pairs:
    SV: experiments/tests/fixtures/eval/sv_pairs.jsonl
    Wh: experiments/tests/fixtures/eval/wh_pairs.jsonl
    RC: experiments/tests/fixtures/eval/rc_pairs.jsonl

output:
  path: results/smoke/structural/results.json
