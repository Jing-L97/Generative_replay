# Smoke test: semantic (word-embedding) datastore. Builds an index but evaluates
# baseline LM output (key space != model hidden space). Exercises build_semantic.
model:
  name_or_path: sshleifer/tiny-gpt2
  model_type: gpt2

corpus:
  path: experiments/tests/fixtures/train/tiny_corpus.txt

retrieval:
  mode: semantic
  granularity: sequence
  tau: 3
  k: 1
  lmbda: 0.25
  tau_softmax: 1.0

datastore:
  variant: glove+fasttext
  dir: results/smoke/semantic
  embeddings:
    - experiments/tests/fixtures/embeddings/tiny_glove.txt
    - experiments/tests/fixtures/embeddings/tiny_fasttext.txt
  tiny_mode: true
  model_type: glove_fasttext

eval:
  freq_path: experiments/tests/fixtures/freq/tiny_word_freq.json
  pairs:
    SV: experiments/tests/fixtures/eval/sv_pairs.jsonl
    Wh: experiments/tests/fixtures/eval/wh_pairs.jsonl
    RC: experiments/tests/fixtures/eval/rc_pairs.jsonl

output:
  path: results/smoke/semantic/results.json
