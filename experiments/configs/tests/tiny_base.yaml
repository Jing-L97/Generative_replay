# Smoke test: baseline (parametric only). No datastore is built.
model:
  name_or_path: sshleifer/tiny-gpt2
  model_type: gpt2

corpus:
  path: experiments/tests/fixtures/train/tiny_corpus.txt

retrieval:
  mode: none
  granularity: sequence
  tau: 3
  k: 1
  lmbda: 0.25
  tau_softmax: 1.0

datastore:
  dir: results/smoke/base
  tiny_mode: true

eval:
  freq_path: experiments/tests/fixtures/freq/tiny_word_freq.json
  pairs:
    SV: experiments/tests/fixtures/eval/sv_pairs.jsonl
    Wh: experiments/tests/fixtures/eval/wh_pairs.jsonl
    RC: experiments/tests/fixtures/eval/rc_pairs.jsonl

output:
  path: results/smoke/base/results.json
